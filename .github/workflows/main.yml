name: "Enmxy Anime Arşiv Sistemi V3"

on:
  # Manuel olarak başlatmamızı sağlar
  workflow_dispatch:
    inputs:
      anime_url:
        description: 'Bölüm numarasından ÖNCEKİ link (Örn: https://animecix.tv/titles/7352/jujutsu-kaisen/season/1/episode/)'
        required: true
      start_ep:
        description: 'Başlangıç Bölümü'
        required: true
        default: '1'
      end_ep:
        description: 'Bitiş Bölümü'
        required: true
        default: '12'

jobs:
  operasyon_baslasin:
    runs-on: ubuntu-latest # GitHub'ın bize verdiği ücretsiz canavar makine
    
    steps:
      - name: 📂 Kodları Klonla
        uses: actions/checkout@v4

      - name: 🐍 Python Ortamını Hazırla
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🌐 Chrome'u En Güncel Sürüme Zorla (HATA ÇÖZÜCÜ)
        # Aldığın sürüm hatasını bu adım çözer. GitHub'daki Chrome'u en sona günceller.
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🛠️ Gerekli Kütüphaneleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install undetected-chromedriver huggingface_hub yt-dlp selenium requests webdriver-manager

      - name: 🎬 Botu Ateşle
        env:
          # Gizli kasadaki token'ı ve senin yazdığın linkleri bota aktarıyoruz
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANIME_URL: ${{ github.event.inputs.anime_url }}
          START_EP: ${{ github.event.inputs.start_ep }}
          END_EP: ${{ github.event.inputs.end_ep }}
        run: python bot.py
