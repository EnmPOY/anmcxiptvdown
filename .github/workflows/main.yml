name: "Enmxy Anime Arşivleme ve IPTV Sistemi"

on:
  workflow_dispatch: # Manuel kontrol paneli
    inputs:
      anime_url:
        description: 'Bölüm numarasından ÖNCEKİ link (Örn: https://animecix.tv/titles/7352/jujutsu-kaisen/season/1/episode/)'
        required: true
      start_ep:
        description: 'Başlangıç Bölümü'
        required: true
        default: '1'
      end_ep:
        description: 'Bitiş Bölümü'
        required: true
        default: '12'

jobs:
  anime_operasyonu:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Dosyaları Klonla
        uses: actions/checkout@v4

      - name: 🐍 Python 3.10 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🌐 Chrome ve Sürücü Güncelle (Sürüm Hatası Çözücü)
        # 145 vs 146 kavgasını bitiren adım burası.
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🛠️ Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install undetected-chromedriver huggingface_hub yt-dlp selenium requests webdriver-manager

      - name: 🎬 Botu Başlat
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANIME_URL: ${{ github.event.inputs.anime_url }}
          START_EP: ${{ github.event.inputs.start_ep }}
          END_EP: ${{ github.event.inputs.end_ep }}
        run: python bot.py
