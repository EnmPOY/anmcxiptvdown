name: "Enmxy Ultimate Anime Archiver v4"

on:
  workflow_dispatch:
    inputs:
      anime_url:
        description: 'Bölüm numarasından ÖNCEKİ link (Örn: https://animecix.tv/titles/80/naruto/season/1/episode/)'
        required: true
      start_ep:
        description: 'Başlangıç Bölümü'
        required: true
        default: '1'
      end_ep:
        description: 'Bitiş Bölümü'
        required: true
        default: '5'

jobs:
  operasyon:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Kodları Klonla
        uses: actions/checkout@v4

      - name: 🐍 Python 3.10 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🌐 Chrome'u Güncelle (Sürüm Hatası Engelleyici)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🛠️ Kütüphaneleri Yükle
        run: pip install -r requirements.txt

      - name: 🎬 Botu Ateşle
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANIME_URL: ${{ github.event.inputs.anime_url }}
          START_EP: ${{ github.event.inputs.start_ep }}
          END_EP: ${{ github.event.inputs.end_ep }}
        run: python bot.py
