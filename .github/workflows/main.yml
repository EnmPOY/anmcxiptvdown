name: "Anime Sniffer & Archiver"

on:
  workflow_dispatch:
    inputs:
      anime_url:
        description: 'Bölüm URL (Örn: https://animecix.tv/titles/80/naruto/season/1/episode/)'
        required: true
      start_ep:
        description: 'Başlangıç'
        required: true
        default: '1'
      end_ep:
        description: 'Bitiş'
        required: true
        default: '5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🌐 Update Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🛠️ Install Dependencies
        run: pip install -r requirements.txt

      - name: 🎬 Run Sniffer Bot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANIME_URL: ${{ github.event.inputs.anime_url }}
          START_EP: ${{ github.event.inputs.start_ep }}
          END_EP: ${{ github.event.inputs.end_ep }}
        run: python bot.py
