name: Enmpoy 7/24 Ölüm Makinesi

on:
  schedule:
    # Her 4 saatte bir çalışarak sistemi tetikler. Sınırları aşmayız.
    - cron: "0 */4 * * *"
  workflow_dispatch: # Manuel tetikleme butonu ekler

jobs:
  anigexis_somurucu:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v3

      - name: Python 3.10 Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Silahları ve Şarjörleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Motoru Ateşle
        run: |
          python bot.py
