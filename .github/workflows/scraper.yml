name: Enmpoy 7/24 Ölüm Makinesi

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: 

jobs:
  anigexis_somurucu:
    runs-on: ubuntu-latest 

    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v3

      - name: Python 3.10 Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Silahları ve Şarjörleri Yükle (Saf Hız Modu)
        run: |
          python -m pip install --upgrade pip
          pip install playwright yt-dlp huggingface_hub
          playwright install chromium --with-deps

      - name: Motoru Ateşle ve İçinden Geç!
        run: |
          python bot.py
